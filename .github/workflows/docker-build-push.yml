name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Package dist as archive
        run: |
          cd dist
          tar -czf ../network-panel-web.tar.gz .
          echo "=== 构建产物 ==="
          ls -lh ../network-panel-web.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: network-panel-web
          path: network-panel-web.tar.gz

      - name: Create/Update GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "NetworkPanel ${{ github.ref_name }}"
          generate_release_notes: true
          files: network-panel-web.tar.gz
          body: |
            ## 📦 自动构建产物

            - **Web 版**: `network-panel-web.tar.gz` — 解压部署到任意静态服务器
            - **Docker**: `docker pull ghcr.io/${{ github.repository }}:latest`

            ```bash
            # Docker 部署
            docker run -d --rm -p 8080:80 ghcr.io/${{ github.repository }}:latest

            # 或下载 web 包解压部署
            tar -xzf network-panel-web.tar.gz -C /var/www/html/
            ```

  docker:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
