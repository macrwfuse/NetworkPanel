name: Build and Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

env:
  NODE_VERSION: '20'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build project
        run: pnpm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Package dist as archive
        run: |
          cd dist
          tar -czf ../network-panel-web.tar.gz .

      - name: Create GitHub Release
        id: create_release
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: NetworkPanel ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            network-panel-web.tar.gz
          body: |
            ## 📦 自动构建产物

            - **Web 版**: `network-panel-web.tar.gz` — 可直接部署到任意静态服务器

            也可使用 Docker 部署：
            ```bash
            docker run -d --rm -p 8080:80 netart/network-panel:latest
            ```
